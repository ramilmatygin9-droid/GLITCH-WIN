<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0c0f;
            --card: #161920;
            --accent: #ffcc00;
            --win: #00ff88;
            --lose: #ff4444;
            --border: #2a2e38;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
        }

        /* GUI Уведомление */
        #result-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            border: 2px solid var(--accent);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -60%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .balance-card {
            background: var(--card);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .balance-card span { color: var(--accent); }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 110px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: 0; bottom: 0;
            width: 4px;
            background: var(--accent);
            z-index: 10;
            box-shadow: 0 0 15px var(--accent);
            transform: translateX(-50%);
        }

        .tape {
            display: flex;
            will-change: transform;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .item {
            min-width: 90px;
            height: 90px;
            margin: 0 5px;
            background: #20242d;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-bottom: 4px solid #333;
        }

        .case-area { margin-top: 40px; text-align: center; }

        .case-box {
            width: 160px; height: 100px;
            background: linear-gradient(135deg, #2a2e38, #161920);
            border: 2px solid var(--accent);
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .opening { animation: openEffect 0.6s forwards; }

        @keyframes openEffect {
            50% { transform: scale(1.2) rotate(5deg); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        .btn-spin {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-spin:disabled { background: #444; }
    </style>
</head>
<body>

    <div id="result-popup">
        <h2 id="result-title"></h2>
        <p id="result-text" style="font-size: 24px; font-weight: bold;"></p>
    </div>

    <div class="balance-card">Баланс: <span id="balance">Загрузка...</span> m¢</div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <div class="case-area">
        <div id="caseBox" class="case-box" onclick="startSpin()">КЕЙС (100 m¢)</div>
        <button id="spinBtn" class="btn-spin" onclick="startSpin()">ОТКРЫТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 1000; 
        let isSpinning = false;
        const tape = document.getElementById('tape');
        const possiblePrizes = [10, 20, 30, 50, 100, 150, 250, 500];

        // Синхронизация с темой ТГ (опционально)
        document.getElementById('balance').innerText = balance;

        function generateTape() {
            tape.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const val = possiblePrizes[Math.floor(Math.random() * possiblePrizes.length)];
                const div = document.createElement('div');
                div.className = 'item';
                div.style.borderBottomColor = val >= 100 ? '#ffcc00' : '#333';
                div.innerHTML = `<span>${val}</span><small>m¢</small>`;
                tape.appendChild(div);
            }
        }

        function startSpin() {
            if (isSpinning || balance < 100) {
                if (balance < 100) tg.showAlert("Недостаточно средств!");
                return;
            }
            
            isSpinning = true;
            balance -= 100;
            updateUI();

            document.getElementById('caseBox').classList.add('opening');
            generateTape();
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                const winIndex = 50; // Индекс выигрышного слота
                const winValue = possiblePrizes[Math.floor(Math.random() * possiblePrizes.length)];
                
                // Подменяем 50-й элемент на наш реальный выигрыш
                tape.children[winIndex].innerHTML = `<span>${winValue}</span><small>m¢</small>`;
                
                const spinDistance = (winIndex * 100) - (tape.parentElement.offsetWidth / 2) + 50;
                tape.style.transform = `translateX(-${spinDistance}px)`;

                setTimeout(() => {
                    finishGame(winValue);
                }, 5200);
            }, 100);
        }

        function finishGame(win) {
            balance += win;
            updateUI();
            
            const popup = document.getElementById('result-popup');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            
            const profit = win - 100;
            if (profit >= 0) {
                title.innerText = "ВЫИГРЫШ!";
                title.style.color = "var(--win)";
                text.innerText = `+${win} m¢`;
            } else {
                title.innerText = "ПРОИГРЫШ";
                title.style.color = "var(--lose)";
                text.innerText = `${win} m¢`;
            }

            popup.style.display = 'block';

            // Отправляем данные в Telegram Бота через 2 секунды
            setTimeout(() => {
                const data = {
                    action: 'case_result',
                    win: win,
                    cost: 100
                };
                tg.sendData(JSON.stringify(data)); 
            }, 2000);
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('spinBtn').disabled = isSpinning;
        }

        generateTape();
    </script>
</body>
</html>
