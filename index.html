<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0b0c0f;
            --card: #161920;
            --accent: #ffcc00;
            --win: #00ff88;
            --lose: #ff4444;
            --border: #2a2e38;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* GUI Уведомление */
        #result-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            border: 2px solid var(--accent);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -70%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -30%);
            }
        }

        .balance-card {
            background: var(--card);
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid var(--border);
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .balance-card span { 
            color: var(--accent);
            font-size: 28px;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .roulette-viewport {
            overflow: hidden;
            position: relative;
            height: 110px;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: -5px;
            bottom: -5px;
            width: 5px;
            background: var(--accent);
            z-index: 10;
            box-shadow: 0 0 20px var(--accent);
            transform: translateX(-50%);
        }

        .pointer::before {
            content: '▼';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 20px;
        }

        .tape {
            display: flex;
            will-change: transform;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .item {
            min-width: 90px;
            height: 90px;
            margin: 10px 5px;
            background: linear-gradient(135deg, #20242d, #1a1e26);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-bottom: 4px solid #333;
            transition: all 0.3s ease;
        }

        .item.win-highlight {
            border-bottom-color: var(--accent);
            box-shadow: 0 0 20px rgba(255,204,0,0.5);
            transform: scale(1.05);
        }

        .case-area {
            margin-top: 40px;
            text-align: center;
        }

        .case-box {
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #2a2e38, #161920);
            border: 3px solid var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .case-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,204,0,0.3);
        }

        .case-box::before {
            content: '📦';
            font-size: 50px;
            position: relative;
            z-index: 1;
        }

        .opening {
            animation: openEffect 0.6s ease-out forwards;
        }

        @keyframes openEffect {
            0% {
                transform: scale(1) rotate(0deg);
            }
            30% {
                transform: scale(1.3) rotate(10deg);
                filter: brightness(1.5);
            }
            60% {
                transform: scale(1.1) rotate(-5deg);
            }
            100% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
                visibility: hidden;
            }
        }

        .btn-spin {
            margin-top: 25px;
            padding: 15px 50px;
            background: linear-gradient(135deg, var(--accent), #ffaa00);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,204,0,0.3);
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Анимация для монет */
        @keyframes coinRain {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(500px) rotate(360deg);
                opacity: 0;
            }
        }

        .coin {
            position: fixed;
            font-size: 30px;
            pointer-events: none;
            z-index: 999;
            animation: coinRain 1s ease-out forwards;
        }
    </style>
</head>
<body>

    <div id="result-popup">
        <h2 id="result-title"></h2>
        <p id="result-text" style="font-size: 28px; font-weight: bold;"></p>
        <p id="result-balance" style="font-size: 16px; margin-top: 10px;"></p>
        <button onclick="closePopup()" style="margin-top: 15px; padding: 8px 25px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Закрыть</button>
    </div>

    <div class="balance-card">
        💰 Баланс: <span id="balance">Загрузка...</span> m¢
    </div>

    <div class="roulette-wrapper">
        <div class="roulette-viewport">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
    </div>

    <div class="case-area">
        <div id="caseBox" class="case-box"></div>
        <button id="spinBtn" class="btn-spin" onclick="startSpin()">🎲 ОТКРЫТЬ КЕЙС (100 m¢)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        let balance = 1000;
        let isSpinning = false;
        let currentWinAmount = 0;
        const tape = document.getElementById('tape');
        
        // Призы с разными шансами
        const prizes = [
            { value: 10, chance: 25, color: '#666' },
            { value: 20, chance: 20, color: '#666' },
            { value: 30, chance: 18, color: '#666' },
            { value: 50, chance: 15, color: '#888' },
            { value: 100, chance: 10, color: '#ffcc00' },
            { value: 150, chance: 6, color: '#ffaa00' },
            { value: 250, chance: 4, color: '#ff8800' },
            { value: 500, chance: 2, color: '#ff5500' }
        ];

        // Функция для получения случайного приза
        function getRandomPrize() {
            const random = Math.random() * 100;
            let sum = 0;
            for (let prize of prizes) {
                sum += prize.chance;
                if (random <= sum) return prize.value;
            }
            return 10;
        }

        // Генерация ленты
        function generateTape() {
            tape.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const prize = getRandomPrize();
                const div = document.createElement('div');
                div.className = 'item';
                div.style.borderBottomColor = prize >= 100 ? '#ffcc00' : '#333';
                div.innerHTML = `<span style="font-size: 24px;">${prize}</span><small>m¢</small>`;
                tape.appendChild(div);
            }
        }

        // Синхронизация баланса с Telegram
        async function syncBalance() {
            try {
                tg.sendData(JSON.stringify({ action: 'get_balance' }));
            } catch(e) {
                console.log('Waiting for response...');
            }
            
            // Запрашиваем баланс каждые 3 секунды
            setInterval(() => {
                if (!isSpinning) {
                    tg.sendData(JSON.stringify({ action: 'get_balance' }));
                }
            }, 3000);
        }

        // Обновление UI
        function updateUI() {
            document.getElementById('balance').innerText = balance;
            const btn = document.getElementById('spinBtn');
            btn.disabled = isSpinning;
            btn.textContent = isSpinning ? '⏳ ОТКРЫТИЕ...' : '🎲 ОТКРЫТЬ КЕЙС (100 m¢)';
        }

        // Анимация монет
        function createCoinAnimation(isWin) {
            const coinChar = isWin ? '💰' : '💔';
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    coin.textContent = coinChar;
                    coin.style.left = Math.random() * window.innerWidth + 'px';
                    coin.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(coin);
                    setTimeout(() => coin.remove(), 1000);
                }, i * 50);
            }
        }

        // Показать результат
        function showResult(winAmount, isWin, newBalance) {
            const popup = document.getElementById('result-popup');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');
            const balanceSpan = document.getElementById('result-balance');
            
            if (isWin) {
                title.innerHTML = '🎉 ПОБЕДА! 🎉';
                title.style.color = 'var(--win)';
                text.innerHTML = `+${winAmount} m¢`;
                text.style.color = 'var(--win)';
                createCoinAnimation(true);
            } else {
                title.innerHTML = '💔 ПРОИГРЫШ 💔';
                title.style.color = 'var(--lose)';
                text.innerHTML = `${winAmount} m¢`;
                text.style.color = 'var(--lose)';
                createCoinAnimation(false);
            }
            
            balanceSpan.innerHTML = `💰 Новый баланс: ${newBalance} m¢`;
            popup.style.display = 'block';
            
            // Автоматически закрыть через 3 секунды
            setTimeout(() => closePopup(), 3000);
        }

        function closePopup() {
            const popup = document.getElementById('result-popup');
            popup.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => {
                popup.style.display = 'none';
                popup.style.animation = '';
            }, 300);
        }

        // Основная игра
        function startSpin() {
            if (isSpinning) return;
            
            const bet = 100;
            if (balance < bet) {
                tg.showAlert('❌ Недостаточно средств! Пополните баланс в Telegram боте.');
                return;
            }
            
            isSpinning = true;
            const oldBalance = balance;
            balance -= bet;
            updateUI();
            
            // Анимация кейса
            const caseBox = document.getElementById('caseBox');
            caseBox.classList.add('opening');
            
            setTimeout(() => {
                caseBox.classList.remove('opening');
            }, 600);
            
            // Генерируем выигрыш
            const winAmount = getRandomPrize();
            currentWinAmount = winAmount;
            const isWin = winAmount > bet;
            
            // Генерируем новую ленту
            generateTape();
            
            // Сброс позиции ленты
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            
            setTimeout(() => {
                // Находим или создаем элемент с выигрышем
                const items = tape.children;
                const centerIndex = Math.floor(items.length / 2);
                
                // Обновляем центральный элемент
                if (items[centerIndex]) {
                    items[centerIndex].innerHTML = `<span style="font-size: 28px;">${winAmount}</span><small>m¢</small>`;
                    items[centerIndex].style.borderBottomColor = winAmount >= 100 ? '#ffcc00' : '#333';
                    items[centerIndex].classList.add('win-highlight');
                    
                    setTimeout(() => {
                        items[centerIndex].classList.remove('win-highlight');
                    }, 1000);
                }
                
                // Запускаем анимацию прокрутки
                tape.style.transition = 'transform 3.5s cubic-bezier(0.2, 0.9, 0.3, 1.1)';
                const scrollDistance = (centerIndex * 100) - 150;
                tape.style.transform = `translateX(-${scrollDistance}px)`;
                
                setTimeout(() => {
                    // Финальный баланс
                    const finalBalance = oldBalance - bet + winAmount;
                    balance = finalBalance;
                    updateUI();
                    
                    // Отправляем результат в Telegram
                    const gameData = {
                        action: 'case_result',
                        win_amount: winAmount,
                        bet: bet,
                        multiplier: (winAmount / bet).toFixed(2)
                    };
                    tg.sendData(JSON.stringify(gameData));
                    
                    showResult(winAmount, isWin, finalBalance);
                    
                    setTimeout(() => {
                        isSpinning = false;
                        updateUI();
                    }, 500);
                    
                }, 3500);
                
            }, 100);
        }

        // Обработка сообщений от Telegram бота
        window.Telegram.WebApp.onEvent('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.action === 'update_balance') {
                    balance = data.balance;
                    updateUI();
                }
            } catch(e) {
                console.log('Parse error:', e);
            }
        });

        // Обработка данных от бота
        tg.onEvent('mainButtonClicked', () => {});
        
        // Запрос баланса при загрузке
        tg.sendData(JSON.stringify({ action: 'init', page: 'case_opener' }));
        
        // Инициализация
        generateTape();
        updateUI();
        syncBalance();
        
        // Устанавливаем текст на кнопку
        document.getElementById('spinBtn').innerHTML = '🎲 ОТКРЫТЬ КЕЙС (100 m¢)';
        
        console.log('Game ready!');
    </script>
</body>
</html>
