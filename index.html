<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bank App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1c1f26;
            --accent-color: #007aff;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Карточка баланса */
        .balance-card {
            background: linear-gradient(135deg, #1c1f26 0%, #2c313a 100%);
            width: 100%;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .balance-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
        }

        /* Кнопки действий */
        .actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            margin-bottom: 30px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .icon-circle {
            background-color: var(--card-bg);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .icon-circle:active {
            transform: scale(0.9);
            background-color: #2c313a;
        }

        /* Список транзакций */
        .section-title {
            width: 100%;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .transactions {
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 10px;
            box-sizing: border-box;
        }

        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #2c313a;
        }

        .transaction:last-child { border-bottom: none; }

        .tx-info { display: flex; align-items: center; gap: 12px; }
        .tx-icon { width: 40px; height: 40px; border-radius: 12px; background: #333; display: flex; align-items: center; justify-content: center; }
        .tx-name { font-weight: 500; font-size: 15px; }
        .tx-date { color: var(--text-secondary); font-size: 12px; }
        .tx-amount { font-weight: 600; }
        .plus { color: #4cd964; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="balance-label">Общий баланс</div>
        <div class="balance-amount" id="balance">54 250,00 ₽</div>
    </div>

    <div class="actions">
        <div class="action-item" onclick="sendData('topup')">
            <div class="icon-circle">➕</div>
            <span>Пополнить</span>
        </div>
        <div class="action-item" onclick="sendData('transfer')">
            <div class="icon-circle">↗️</div>
            <span>Перевод</span>
        </div>
        <div class="action-item" onclick="sendData('cards')">
            <div class="icon-circle">💳</div>
            <span>Карты</span>
        </div>
        <div class="action-item" onclick="sendData('history')">
            <div class="icon-circle">🧾</div>
            <span>История</span>
        </div>
    </div>

    <div class="section-title">Последние операции</div>
    
    <div class="transactions">
        <div class="transaction">
            <div class="tx-info">
                <div class="tx-icon">🎮</div>
                <div>
                    <div class="tx-name">Roblox Top-up</div>
                    <div class="tx-date">Сегодня, 14:20</div>
                </div>
            </div>
            <div class="tx-amount">- 450 ₽</div>
        </div>
        <div class="transaction">
            <div class="tx-info">
                <div class="tx-icon">🍔</div>
                <div>
                    <div class="tx-name">Вкусно — и точка</div>
                    <div class="tx-date">Вчера, 19:05</div>
                </div>
            </div>
            <div class="tx-amount">- 820 ₽</div>
        </div>
        <div class="transaction">
            <div class="tx-info">
                <div class="tx-icon">💰</div>
                <div>
                    <div class="tx-name">Перевод от Lera</div>
                    <div class="tx-date">22 апр, 12:00</div>
                </div>
            </div>
            <div class="tx-amount plus">+ 1 500 ₽</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function sendData(action) {
            // Отправка данных обратно в бот
            tg.sendData(JSON.stringify({action: action}));
        }
    </script>
</body>
</html>
