<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .header { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .balance { font-size: 28px; font-weight: bold; color: #f1c40f; }
        
        .nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav button { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #333; color: white; }
        .nav button.active { background: #0088cc; }

        .page { display: none; }
        .active-page { display: block; }

        .click-btn { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #0088cc; background: #1a1a1a; color: white; font-size: 20px; font-weight: bold; margin: 30px auto; cursor: pointer; display: block; box-shadow: 0 0 20px rgba(0,136,204,0.4); }
        .click-btn:active { transform: scale(0.95); }

        .shop-item { background: #1e1e1e; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .shop-item b { display: block; font-size: 16px; }
        .buy-btn { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .promo-section { margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 12px; }
        input { width: 80%; padding: 10px; border-radius: 8px; border: none; background: #333; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 14px; color: #aaa;">Твой баланс:</div>
    <div class="balance" id="balance">0 💰</div>
</div>

<div class="nav">
    <button id="btn-main" class="active" onclick="showPage('main')">Игра</button>
    <button id="btn-shop" onclick="showPage('shop')">Магазин</button>
</div>

<div id="main" class="page active-page">
    <button class="click-btn" onclick="clickAction()">КЛИК!</button>
    <div class="promo-section">
        <input type="text" id="promoCode" placeholder="Введи промокод...">
        <button class="buy-btn" style="width: 100%;" onclick="activatePromo()">Активировать</button>
    </div>
</div>

<div id="shop" class="page">
    <div class="shop-item">
        <div>
            <b>Медный клик</b>
            <small>+2 за клик</small>
        </div>
        <button class="buy-btn" onclick="buy(100, 2)">100 💰</button>
    </div>
    <div class="shop-item">
        <div>
            <b>Золотой бур</b>
            <small>+10 за клик</small>
        </div>
        <button class="buy-btn" onclick="buy(500, 10)">500 💰</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    let balance = 0;
    let power = 1;
    tg.expand();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active-page');
        document.getElementById('btn-' + (pageId === 'main' ? 'main' : 'shop')).classList.add('active');
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(0) + " 💰";
    }

    function clickAction() {
        balance += power;
        updateUI();
        tg.HapticFeedback.impactOccurred('medium'); // Вибрация при клике!
    }

    function buy(price, addPower) {
        if (balance >= price) {
            balance -= price;
            power += addPower;
            updateUI();
            alert("Успешно куплено! Сила: " + power);
        } else {
            alert("Мало монет!");
        }
    }

    function activatePromo() {
        let code = document.getElementById('promoCode').value.toLowerCase();
        if (code === 'carrot' || code === 'admin') {
            balance += 1000;
            updateUI();
            alert("Промокод принят! +1000 💰");
        } else {
            alert("Код не найден");
        }
    }
</script>
</body>
</html>
