<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Roulette & Cases</title>
    <style>
        :root {
            --gold: #ffcc00;
            --bg: #0a0a0a;
            --panel: #161616;
            --accent: #ff3366;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Анимированный баланс */
        .balance-container {
            font-size: 2em;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .balance-up { transform: scale(1.2); color: #00ff88; }

        /* Барабан */
        .roulette-box {
            position: relative;
            width: 300px;
            height: 300px;
            border: 8px solid var(--panel);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #1a1a1a 0deg 45deg, #252525 45deg 90deg,
                #1a1a1a 90deg 135deg, #252525 135deg 180deg,
                #1a1a1a 180deg 225deg, #252525 225deg 270deg,
                #1a1a1a 270deg 315deg, #252525 315deg 360deg
            );
        }

        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid var(--accent);
            z-index: 5;
        }

        /* Кейс */
        .case {
            width: 200px;
            height: 120px;
            background: linear-gradient(45deg, #333, #444);
            border: 3px solid var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 30px;
            position: relative;
            font-weight: bold;
            font-size: 1.2em;
        }

        .case.opening { animation: shake 0.1s infinite; border-color: white; }

        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(2px, -1px); }
        }

        .btn-main {
            padding: 15px 50px;
            background: var(--gold);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(255,204,0,0.3);
        }
    </style>
</head>
<body>

    <div class="balance-container" id="balance-display">1000 m¢</div>

    <div class="roulette-box">
        <div class="arrow"></div>
        <div id="wheel" class="wheel"></div>
    </div>

    <button class="btn-main" onclick="startSpin()">КРУТИТЬ</button>

    <div class="case" id="main-case" onclick="startOpenCase()">КЕЙС</div>

    <script>
        let currentBalance = 1000;
        let isRunning = false;

        // Создаем сектора от 10 до 100
        const prizes = [10, 25, "📦", 50, 15, "📦", 100, 30];
        const wheel = document.getElementById('wheel');

        prizes.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'sector';
            div.style.transform = `rotate(${i * 45}deg)`;
            div.innerHTML = `<span style="transform: rotate(45deg)">${p}</span>`;
            wheel.appendChild(div);
        });

        // Функция плавной анимации цифр
        function animateBalance(target) {
            const display = document.getElementById('balance-display');
            display.classList.add('balance-up');
            
            const start = currentBalance;
            const duration = 1000;
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                const current = Math.floor(progress * (target - start) + start);
                display.innerText = `${current} m¢`;
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    currentBalance = target;
                    display.classList.remove('balance-up');
                }
            }
            window.requestAnimationFrame(step);
        }

        function startSpin() {
            if (isRunning || currentBalance < 50) return;
            isRunning = true;
            
            animateBalance(currentBalance - 50);

            const rotation = Math.floor(Math.random() * 360) + 3600; 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const actualDeg = rotation % 360;
                const index = Math.floor(((360 - actualDeg + 22.5) % 360) / 45);
                const win = prizes[index];

                if (win === "📦") {
                    alert("Вы получили КЕЙС!");
                } else {
                    animateBalance(currentBalance + win);
                }
                isRunning = false;
            }, 4000);
        }

        function startOpenCase() {
            if (isRunning) return;
            const caseEl = document.getElementById('main-case');
            caseEl.classList.add('opening');
            isRunning = true;

            setTimeout(() => {
                caseEl.classList.remove('opening');
                const win = Math.floor(Math.random() * (100 - 10 + 1)) + 10; // Валюта от 10 до 100
                animateBalance(currentBalance + win);
                alert(`В кейсе было: ${win} m¢`);
                isRunning = false;
            }, 2000);
        }
    </script>
</body>
</html>
