<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Roulette One-Line</title>
    <style>
        :root {
            --bg: #0d0e12;
            --card: #1c1f26;
            --accent: #ffb700;
            --border: #2d323e;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow-x: hidden;
            padding-top: 50px;
        }

        /* Баланс */
        .balance-box {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 40px;
            padding: 10px 25px;
            background: var(--card);
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .balance-box span { color: var(--accent); }

        /* ЛЕНТОЧНАЯ РУЛЕТКА */
        .roulette-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 120px;
            background: var(--card);
            border: 2px solid var(--border);
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        /* Центрирующая линия */
        .roulette-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            z-index: 10;
            box-shadow: 0 0 15px var(--accent);
            transform: translateX(-50%);
        }

        .tape {
            display: flex;
            align-items: center;
            will-change: transform;
            height: 100%;
        }

        .slot {
            min-width: 100px;
            height: 100px;
            margin: 0 5px;
            background: #252932;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 4px solid #3d4452;
        }

        .slot.rare { border-bottom-color: #ff3e3e; color: #ff3e3e; }
        .slot.gold { border-bottom-color: var(--accent); color: var(--accent); }

        /* Кнопка */
        .btn-spin {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { background: #444; color: #888; }

        /* АНИМАЦИЯ КЕЙСА */
        .case-wrapper {
            margin-top: 50px;
            position: relative;
            cursor: pointer;
        }

        .case-visual {
            width: 150px;
            height: 100px;
            background: linear-gradient(135deg, #3a4150, #1c1f26);
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.3s;
        }

        .case-visual.opening {
            animation: explode 0.5s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(2); border-color: #fff; }
            100% { transform: scale(0); opacity: 0; }
        }

        .win-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--accent);
            color: #000;
            padding: 30px 60px;
            border-radius: 20px;
            font-size: 32px;
            font-weight: 900;
            z-index: 100;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .win-popup.show { transform: translate(-50%, -50%) scale(1); }

    </style>
</head>
<body>

    <div class="balance-box">💰 <span id="balance">1000</span> m¢</div>

    <div class="roulette-container">
        <div id="tape" class="tape"></div>
    </div>

    <button id="spinBtn" class="btn-spin" onclick="startRoulette()">ОТКРЫТЬ КЕЙС (100 m¢)</button>

    <div class="case-wrapper" id="caseRoot" onclick="startRoulette()">
        <div class="case-visual" id="caseIcon">BOX</div>
    </div>

    <div id="winPopup" class="win-popup">+100 m¢</div>

    <script>
        let balance = 1000;
        let isSpinning = false;
        const tape = document.getElementById('tape');
        const items = [
            {v: 10, t: 'common'}, {v: 20, t: 'common'}, {v: 50, t: 'rare'}, 
            {v: 15, t: 'common'}, {v: 100, t: 'gold'}, {v: 30, t: 'rare'},
            {v: 5, t: 'common'}, {v: 80, t: 'gold'}
        ];

        // Создаем длинную ленту
        function initTape() {
            tape.innerHTML = '';
            for(let i = 0; i < 100; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const div = document.createElement('div');
                div.className = `slot ${item.t}`;
                div.innerHTML = `<span>${item.v}</span><small>m¢</small>`;
                tape.appendChild(div);
            }
        }

        function startRoulette() {
            if (isSpinning || balance < 100) return;
            isSpinning = true;
            balance -= 100;
            updateUI();

            // Анимация кейса
            const caseIcon = document.getElementById('caseIcon');
            caseIcon.classList.add('opening');

            // Сброс ленты
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                // Вычисляем случайную остановку (каждый слот 110px с отступами)
                const stopAt = 110 * 70 + Math.floor(Math.random() * 80); 
                tape.style.transform = `translateX(-${stopAt}px)`;

                setTimeout(() => {
                    // Определяем выигрыш
                    const finalIndex = Math.floor((stopAt + 300) / 110);
                    const winValue = items[Math.floor(Math.random() * items.length)].v; // Упрощенный расчет
                    
                    showWin(winValue);
                    balance += winValue;
                    updateUI();
                    
                    isSpinning = false;
                    caseIcon.classList.remove('opening');
                    initTape(); // Пересобираем ленту
                }, 5200);
            }, 100);
        }

        function showWin(val) {
            const popup = document.getElementById('winPopup');
            popup.innerText = `+${val} m¢`;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 2000);
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('spinBtn').disabled = isSpinning;
        }

        initTape();
    </script>
</body>
</html>
</html>
