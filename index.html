<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Чистый белый дизайн */
        body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; margin: 0; padding: 15px; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid #f0f0f0; margin-bottom: 20px; }
        .balance { font-size: 22px; font-weight: bold; color: #27ae60; }

        /* Рулетка */
        .roulette-container { position: relative; width: 100%; height: 120px; border: 2px solid #333; border-radius: 10px; overflow: hidden; background: #fafafa; margin-bottom: 20px; }
        .pointer { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; background: red; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .item { min-width: 100px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #eee; font-weight: bold; font-size: 14px; }

        /* Редкость */
        .common { background: #dcdde1; } /* Обычный */
        .rare { background: #3498db; color: white; } /* Редкий */
        .epic { background: #9b59b6; color: white; } /* Эпик */
        .legendary { background: #f1c40f; color: black; } /* Легендарка (Джекпот) */

        /* Кнопки и Инвентарь */
        .btn { background: #333; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn:disabled { background: #ccc; }
        .inventory { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .inv-item { padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <span>Мой кошелек:</span>
    <div class="balance" id="balance">5000 💰</div>
</div>

<div class="roulette-container">
    <div class="pointer"></div>
    <div id="tape" class="tape"></div>
</div>

<button id="openBtn" class="btn" onclick="startSpin()">ОТКРЫТЬ КЕЙС (500 💰)</button>

<h3 style="margin-top: 30px;">Твой Инвентарь</h3>
<div class="inventory" id="inventory"></div>

<script>
    let tg = window.Telegram.WebApp;
    let balance = 5000;
    let isSpinning = false;
    const tape = document.getElementById('tape');
    const invDiv = document.getElementById('inventory');

    // Настройка шансов и наград
    const prizes = [
        { name: "50 💰", val: 50, color: "common", weight: 60 },
        { name: "200 💰", val: 200, color: "common", weight: 25 },
        { name: "1000 💰", val: 1000, color: "rare", weight: 10 },
        { name: "5000 💰", val: 5000, color: "epic", weight: 4 },
        { name: "25000 💰", val: 25000, color: "legendary", weight: 1 }
    ];

    function getRandomPrize() {
        let totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
        let random = Math.random() * totalWeight;
        for (let p of prizes) {
            if (random < p.weight) return p;
            random -= p.weight;
        }
    }

    function startSpin() {
        if (isSpinning || balance < 500) return;

        balance -= 500;
        updateUI();
        isSpinning = true;
        document.getElementById('openBtn').disabled = true;

        // Генерируем 50 элементов для рулетки
        tape.innerHTML = '';
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';

        let spinItems = [];
        for (let i = 0; i < 60; i++) {
            spinItems.push(getRandomPrize());
        }

        spinItems.forEach(p => {
            const div = document.createElement('div');
            div.className = `item ${p.color}`;
            div.innerHTML = `<span>${p.name}</span>`;
            tape.appendChild(div);
        });

        // Запуск анимации
        setTimeout(() => {
            const itemWidth = 100;
            const targetIndex = 55; // На каком элементе остановимся
            const offset = (targetIndex * itemWidth) - (window.innerWidth / 2) + (itemWidth / 2);
            
            tape.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
            tape.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                const win = spinItems[targetIndex];
                balance += win.val;
                addToInventory(win);
                updateUI();
                isSpinning = false;
                document.getElementById('openBtn').disabled = false;
                tg.HapticFeedback.notificationOccurred('success');
            }, 4100);
        }, 50);
    }

    function addToInventory(item) {
        const div = document.createElement('div');
        div.className = `inv-item ${item.color}`;
        div.innerText = item.name;
        invDiv.prepend(div);
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance + " 💰";
    }

    tg.expand();
</script>

</body>
</html>
