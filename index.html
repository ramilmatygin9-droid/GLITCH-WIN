<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💰 GLITCH WIN - Кейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #0d0e12 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .balance-box {
            background: linear-gradient(135deg, #1a1e2a, #12141c);
            border: 1px solid #ffcc00;
            border-radius: 60px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .balance-icon {
            font-size: 28px;
        }

        .balance-info {
            display: flex;
            flex-direction: column;
        }

        .balance-label {
            font-size: 12px;
            color: #888;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
            line-height: 1;
        }

        .stats-box {
            background: #1a1e2a;
            border: 1px solid #2a2e38;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
        }

        /* Roulette */
        .roulette-card {
            background: #12141c;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #2a2e38;
        }

        .roulette-view {
            position: relative;
            background: #0a0a0f;
            border-radius: 16px;
            overflow: hidden;
        }

        .roulette-track {
            overflow: hidden;
            position: relative;
            height: 120px;
        }

        .pointer {
            position: absolute;
            left: 50%;
            top: -10px;
            bottom: -10px;
            width: 5px;
            background: #ffcc00;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 15px #ffcc00;
        }

        .pointer::before {
            content: '▼';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            font-size: 22px;
        }

        .slot-list {
            display: flex;
            transition: transform 3.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .slot-item {
            min-width: 95px;
            height: 95px;
            margin: 12px 6px;
            background: linear-gradient(135deg, #1e2430, #161a24);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid #333;
            transition: all 0.2s;
        }

        .slot-item.active {
            border-bottom-color: #ffcc00;
            box-shadow: 0 0 20px rgba(255,204,0,0.5);
            transform: scale(1.02);
        }

        .slot-value {
            font-size: 32px;
            font-weight: bold;
        }

        .slot-label {
            font-size: 11px;
            color: #888;
        }

        /* Case */
        .case-block {
            text-align: center;
            margin-bottom: 30px;
        }

        .case {
            width: 200px;
            height: 140px;
            background: linear-gradient(135deg, #2a2e3a, #1a1e2a);
            border: 3px solid #ffcc00;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 0 auto 20px;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .case:active {
            transform: scale(0.97);
        }

        .case::before {
            content: '📦';
            font-size: 70px;
        }

        .case.open-animation {
            animation: caseOpen 0.5s ease-out forwards;
        }

        @keyframes caseOpen {
            0% { transform: scale(1) rotate(0); }
            30% { transform: scale(1.3) rotate(8deg); filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }

        .open-btn {
            background: linear-gradient(135deg, #ffcc00, #e6b800);
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(255,204,0,0.3);
        }

        .open-btn:active {
            transform: scale(0.96);
        }

        .open-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1e2a, #12141c);
            border: 2px solid #ffcc00;
            border-radius: 28px;
            padding: 35px 50px;
            text-align: center;
            z-index: 1000;
            min-width: 280px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            animation: popupIn 0.3s ease;
        }

        @keyframes popupIn {
            from { opacity: 0; transform: translate(-50%, -70%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .popup-title {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .popup-win {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
        }

        .popup-balance {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        .popup-close {
            margin-top: 20px;
            padding: 10px 30px;
            background: #ffcc00;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Coin animation */
        .coin-fly {
            position: fixed;
            font-size: 35px;
            pointer-events: none;
            z-index: 999;
            animation: coinFall 1s ease-out forwards;
        }

        @keyframes coinFall {
            0% { transform: translateY(-80px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
        }

        /* Loading */
        .loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #ffcc00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <p style="margin-top: 15px;">Синхронизация...</p>
</div>

<div class="popup" id="popup">
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-win" id="popupWin"></div>
    <div class="popup-balance" id="popupBalance"></div>
    <button class="popup-close" onclick="closePopup()">Закрыть</button>
</div>

<div class="top-bar">
    <div class="balance-box">
        <span class="balance-icon">💰</span>
        <div class="balance-info">
            <div class="balance-label">Баланс</div>
            <div class="balance-amount" id="balance">1000</div>
        </div>
    </div>
    <div class="stats-box" id="statsBox">
        <div class="stat">
            <div class="stat-num" id="totalGames">0</div>
            <div class="stat-label">Игр</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="winRate">0%</div>
            <div class="stat-label">Винрейт</div>
        </div>
    </div>
</div>

<div class="roulette-card">
    <div class="roulette-view">
        <div class="pointer"></div>
        <div class="roulette-track">
            <div class="slot-list" id="slotList"></div>
        </div>
    </div>
</div>

<div class="case-block">
    <div class="case" id="caseBox" onclick="startGame()"></div>
    <button class="open-btn" id="openBtn" onclick="startGame()">🎲 ОТКРЫТЬ КЕЙС (100 m¢)</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let balance = 1000;
    let isPlaying = false;
    let totalGames = 0;
    let totalWins = 0;
    
    // Призы
    const prizes = [
        { value: 10, chance: 22 },
        { value: 20, chance: 18 },
        { value: 30, chance: 15 },
        { value: 50, chance: 14 },
        { value: 100, chance: 12 },
        { value: 150, chance: 9 },
        { value: 250, chance: 6 },
        { value: 500, chance: 3 },
        { value: 1000, chance: 1 }
    ];
    
    function getPrize() {
        const rand = Math.random() * 100;
        let sum = 0;
        for (let p of prizes) {
            sum += p.chance;
            if (rand <= sum) return p.value;
        }
        return 10;
    }
    
    function generateSlots() {
        const container = document.getElementById('slotList');
        container.innerHTML = '';
        for (let i = 0; i < 45; i++) {
            const val = getPrize();
            const div = document.createElement('div');
            div.className = 'slot-item';
            div.innerHTML = `<div class="slot-value">${val}</div><div class="slot-label">m¢</div>`;
            container.appendChild(div);
        }
    }
    
    function updateUI() {
        document.getElementById('balance').innerText = balance;
        document.getElementById('openBtn').disabled = isPlaying;
        document.getElementById('openBtn').innerHTML = isPlaying ? '⏳ ОТКРЫТИЕ...' : '🎲 ОТКРЫТЬ КЕЙС (100 m¢)';
        document.getElementById('totalGames').innerText = totalGames;
        const winRate = totalGames > 0 ? Math.round((totalWins / totalGames) * 100) : 0;
        document.getElementById('winRate').innerText = winRate + '%';
    }
    
    function coinAnimation(isWin) {
        const emoji = isWin ? '💰' : '💔';
        for (let i = 0; i < 15; i++) {
            setTimeout(() => {
                const coin = document.createElement('div');
                coin.className = 'coin-fly';
                coin.textContent = emoji;
                coin.style.left = Math.random() * window.innerWidth + 'px';
                coin.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 1000);
            }, i * 40);
        }
    }
    
    function showPopup(isWin, winAmount, newBalance) {
        const popup = document.getElementById('popup');
        const title = document.getElementById('popupTitle');
        const winDiv = document.getElementById('popupWin');
        const balanceSpan = document.getElementById('popupBalance');
        
        if (isWin) {
            title.innerHTML = '🎉 ПОБЕДА! 🎉';
            title.style.color = '#00ff88';
            winDiv.innerHTML = `+${winAmount} m¢`;
            winDiv.style.color = '#00ff88';
        } else {
            title.innerHTML = '💔 ПРОИГРЫШ 💔';
            title.style.color = '#ff4444';
            winDiv.innerHTML = `${winAmount} m¢`;
            winDiv.style.color = '#ff4444';
        }
        
        balanceSpan.innerHTML = `💰 Новый баланс: ${newBalance} m¢`;
        popup.style.display = 'block';
        
        setTimeout(() => closePopup(), 2500);
    }
    
    function closePopup() {
        const popup = document.getElementById('popup');
        popup.style.display = 'none';
    }
    
    function syncToTelegram(newBalance) {
        try {
            tg.sendData(JSON.stringify({
                action: 'web_balance',
                balance: newBalance
            }));
            console.log('Synced to TG:', newBalance);
        } catch(e) {
            console.log('Sync error:', e);
        }
    }
    
    function requestBalance() {
        try {
            tg.sendData(JSON.stringify({ action: 'get_web_balance' }));
        } catch(e) {}
    }
    
    function startGame() {
        if (isPlaying) return;
        
        const bet = 100;
        if (balance < bet) {
            tg.showAlert('❌ Недостаточно средств! Пополните в боте.');
            return;
        }
        
        isPlaying = true;
        const oldBalance = balance;
        balance -= bet;
        updateUI();
        
        // Анимация кейса
        const caseBox = document.getElementById('caseBox');
        caseBox.classList.add('open-animation');
        setTimeout(() => caseBox.classList.remove('open-animation'), 500);
        
        const winAmount = getPrize();
        const isWin = winAmount > bet;
        
        // Статистика
        totalGames++;
        if (isWin) totalWins++;
        
        // Генерация слотов
        generateSlots();
        
        const slotList = document.getElementById('slotList');
        const items = slotList.children;
        const centerIdx = Math.floor(items.length / 2);
        
        slotList.style.transition = 'none';
        slotList.style.transform = 'translateX(0px)';
        
        setTimeout(() => {
            if (items[centerIdx]) {
                items[centerIdx].innerHTML = `<div class="slot-value" style="font-size:38px;">${winAmount}</div><div class="slot-label">m¢</div>`;
                items[centerIdx].classList.add('active');
                setTimeout(() => items[centerIdx].classList.remove('active'), 1000);
            }
            
            slotList.style.transition = 'transform 3.5s cubic-bezier(0.2, 0.9, 0.3, 1.2)';
            const scroll = (centerIdx * 110) - 160;
            slotList.style.transform = `translateX(-${scroll}px)`;
            
            setTimeout(() => {
                const finalBalance = oldBalance - bet + winAmount;
                balance = finalBalance;
                updateUI();
                
                coinAnimation(isWin);
                showPopup(isWin, winAmount, finalBalance);
                syncToTelegram(finalBalance);
                
                setTimeout(() => {
                    isPlaying = false;
                    updateUI();
                }, 500);
            }, 3500);
        }, 100);
    }
    
    // Обработка сообщений от бота
    tg.onEvent('message', function(event) {
        try {
            const data = JSON.parse(event.data);
            console.log('From bot:', data);
            
            if (data.action === 'set_balance' && typeof data.balance === 'number') {
                balance = data.balance;
                updateUI();
            }
            if (data.action === 'stats') {
                if (data.total_games) totalGames = data.total_games;
                if (data.total_wins) totalWins = data.total_wins;
                updateUI();
            }
        } catch(e) {}
    });
    
    // Запрос баланса при старте
    generateSlots();
    updateUI();
    
    setTimeout(() => {
        requestBalance();
    }, 500);
    
    setInterval(() => {
        if (!isPlaying) requestBalance();
    }, 5000);
    
    console.log('✅ Игра готова!');
</script>
</body>
</html>
