<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrot Kombat Web</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .game-card { border: 2px solid #444; border-radius: 15px; padding: 20px; margin: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        #balance { font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <h1>🥕 Carrot Kombat Web</h1>
    <div class="game-card">
        <p>Ваш баланс: <span id="balance">Загрузка...</span> m¢</p>
        <button onclick="playGame()">Испытать удачу (10 m¢)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        // Имитация получения данных (в реальном проекте тут будет Fetch к API)
        let balance = 1000;
        document.getElementById('balance').innerText = balance;

        function playGame() {
            if (balance >= 10) {
                balance -= 10;
                const win = Math.random() > 0.5;
                if (win) {
                    const prize = 20;
                    balance += prize;
                    alert("Вы выиграли " + prize + " m¢!");
                } else {
                    alert("Проигрыш!");
                }
                document.getElementById('balance').innerText = balance;
                
                // Отправляем данные обратно в бот (если нужно закрыть WebApp)
                // tg.sendData(JSON.stringify({new_balance: balance}));
            } else {
                alert("Недостаточно средств!");
            }
        }
    </script>
</body>
</html>
