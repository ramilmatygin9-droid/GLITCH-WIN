<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Case Opener</title>
    <style>
        :root {
            --bg: #0b0c0f;
            --card: #161920;
            --accent: #ffcc00;
            --win: #00ff88;
            --border: #2a2e38;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Баланс */
        .balance-card {
            background: var(--card);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--border);
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .balance-card span { color: var(--accent); }

        /* ЛЕНТОЧНАЯ РУЛЕТКА */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 130px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Линия-указатель */
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            z-index: 10;
            box-shadow: 0 0 15px var(--accent);
            transform: translateX(-50%);
        }

        .tape {
            display: flex;
            will-change: transform;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .item {
            min-width: 100px;
            height: 100px;
            margin: 0 5px;
            background: #20242d;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-bottom: 4px solid #333;
        }

        /* КЕЙС */
        .case-area {
            margin-top: 50px;
            text-align: center;
        }

        .case-box {
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #2a2e38, #161920);
            border: 2px solid var(--accent);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .case-box:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,204,0,0.2); }

        /* Анимация открытия */
        .opening { animation: openEffect 0.6s forwards; }

        @keyframes openEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2) rotate(5deg); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }

        .btn-spin {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-spin:disabled { background: #444; cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="balance-card">Баланс: <span id="balance">1000</span> m¢</div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <div class="case-area">
        <div id="caseBox" class="case-box" onclick="startSpin()">КЕЙС (100 m¢)</div>
        <button id="spinBtn" class="btn-spin" onclick="startSpin()">ОТКРЫТЬ</button>
    </div>

    <script>
        let balance = 1000;
        let isSpinning = false;
        const tape = document.getElementById('tape');
        
        // Набор предметов для ленты (валюта от 10 до 100)
        const possiblePrizes = [10, 15, 20, 25, 30, 40, 50, 60, 70, 80, 90, 100];

        function generateTape() {
            tape.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const val = possiblePrizes[Math.floor(Math.random() * possiblePrizes.length)];
                const div = document.createElement('div');
                div.className = 'item';
                div.style.borderBottomColor = val > 50 ? '#ffcc00' : '#333';
                div.innerHTML = `<span>${val}</span><small>m¢</small>`;
                tape.appendChild(div);
            }
        }

        function startSpin() {
            if (isSpinning || balance < 100) return;
            isSpinning = true;
            balance -= 100;
            updateUI();

            // Эффект кейса
            const box = document.getElementById('caseBox');
            box.classList.add('opening');

            // Подготовка ленты
            generateTape();
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';

            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.15, 1)';
                // Случайная остановка (каждый слот 110px)
                const spinDistance = (110 * 60) + Math.floor(Math.random() * 100);
                tape.style.transform = `translateX(-${spinDistance}px)`;

                setTimeout(() => {
                    const win = possiblePrizes[Math.floor(Math.random() * possiblePrizes.length)];
                    alert(`🥳 Победа! Выпало: ${win} m¢`);
                    
                    balance += win;
                    isSpinning = false;
                    box.classList.remove('opening');
                    updateUI();
                }, 5200);
            }, 100);
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('spinBtn').disabled = isSpinning;
        }

        generateTape();
    </script>
</body>
</html>
