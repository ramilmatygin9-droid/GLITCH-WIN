<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Minimalist</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-secondary: #707070;
            --button-bg: #1c1c1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
            margin: 8px 0 0 0;
        }

        /* Сетка управления */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }

        .grid-item {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            aspect-ratio: 1 / 1;
            transition: background-color 0.2s;
            border: 1px solid #1f1f1f;
        }

        .grid-item:active {
            background-color: #1f1f1f;
        }

        .item-icon {
            font-size: 30px;
            margin-bottom: 15px;
        }

        .item-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.2;
        }

        .item-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Нижняя кнопка */
        .main-btn {
            margin-top: 30px;
            background-color: var(--accent-color);
            color: black;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .main-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Управление</h1>
        <p>Выберите нужный раздел</p>
    </div>

    <div class="grid-container">
        <div class="grid-item" onclick="sendData('my_cards')">
            <div class="item-icon">💳</div>
            <div>
                <div class="item-title">Мои карты</div>
                <div class="item-desc">Управление лимитами</div>
            </div>
        </div>

        <div class="grid-item" onclick="sendData('transfers')">
            <div class="item-icon">🔄</div>
            <div>
                <div class="item-title">Переводы</div>
                <div class="item-desc">По номеру или QR</div>
            </div>
        </div>

        <div class="grid-item" onclick="sendData('settings')">
            <div class="item-icon">⚙️</div>
            <div>
                <div class="item-title">Настройки</div>
                <div class="item-desc">Безопасность</div>
            </div>
        </div>

        <div class="grid-item" onclick="sendData('support')">
            <div class="item-icon">💬</div>
            <div>
                <div class="item-title">Поддержка</div>
                <div class="item-desc">Помощь 24/7</div>
            </div>
        </div>
    </div>

    <div class="main-btn" onclick="sendData('open_profile')">
        Профиль пользователя
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        function sendData(action) {
            tg.sendData(JSON.stringify({
                command: action,
                timestamp: Date.now()
            }));
            tg.close(); // Закрыть WebApp после выбора (опционально)
        }
    </script>
</body>
</html>
